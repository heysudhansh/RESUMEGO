<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ResumeGo</title>
    <link rel="stylesheet" href="registerSTYLE.css">
    
</head>
<body>
    <div class="register-container">
        <div class="register-card">
            <h1 class="site-name">ResumeGo</h1>
            <h2 class="register-title">Welcome User</h2>
            <p class="register-subtitle">Create account</p>

            <form class="register-form">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" id="submit" class="btn-primary">Register</button>
            </form>

            <button type="submit" id="googleReg" class="btn-google" >Register with Google</button>

            <p class="login-account">
                Already have an account? <a href="login.html">Login to your account</a>
            </p>
        </div>
    </div>


<script type="module" src="googleRegistrer.js"></script>
</body>
</html>

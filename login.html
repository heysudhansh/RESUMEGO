<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ResumeGo</title>
    <link rel="stylesheet" href="loginSTYLE.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h1 class="site-name">ResumeGo</h1>
            <h2 class="login-title">Welcome Back</h2>
            <p class="login-subtitle">Please sign in to continue</p>

            <form class="login-form">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" id="submit" class="btn-primary">Login</button>
            </form>

            <button type="submit" id="googleSign" class="btn-google">Login with Google</button>
        </div>
    </div>


<script type="module" src="googleLogin.js"></script>

</body>
</html>
